<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="18" fill="#059669"/>
  <defs>
    <clipPath id="c"><circle cx="50" cy="50" r="32"/></clipPath>
  </defs>
  <!-- White ball -->
  <circle cx="50" cy="50" r="32" fill="white"/>
  <!-- Dark green patches clipped to ball circle -->
  <g clip-path="url(#c)" fill="#065f46">
    <!-- Center pentagon: vertex up, r=11 -->
    <polygon points="50,39 60.5,46.6 56.5,58.9 43.5,58.9 39.5,46.6"/>
    <!-- Top patch: center at (50,26), vertex pointing down toward center -->
    <polygon points="50,38 38.6,29.7 43.0,16.3 57.0,16.3 61.4,29.7"/>
    <!-- Top-right patch: center at (72.8,42.6) -->
    <polygon points="61.4,46.3 65.8,32.9 79.9,32.9 84.2,46.3 72.8,54.6"/>
    <!-- Bottom-right patch: center at (64.1,69.4) -->
    <polygon points="57.1,59.7 71.2,59.7 75.5,73.1 64.1,81.4 52.7,73.1"/>
    <!-- Bottom-left patch: center at (35.9,69.4) -->
    <polygon points="42.9,59.7 47.3,73.1 35.9,81.4 24.5,73.1 28.8,59.7"/>
    <!-- Top-left patch: center at (27.2,42.6) -->
    <polygon points="38.6,46.3 27.2,54.6 15.8,46.3 20.1,32.9 34.2,32.9"/>
  </g>
</svg>
